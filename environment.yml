name: bim_rag
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - conda-forge::ifcopenshell
  - pip
  - pip:
      - psycopg2-binary
      - sqlalchemy==2.0.*
      - pgvector==0.5.*
      - python-dotenv
      - torch --index-url https://download.pytorch.org/whl/cu128
      - sentence-transformers
      - pytest
      - ruff
      # v002 query architecture scaffold (spec_v002_query_architecture.md / task04)
      - fastapi
      - uvicorn[standard]
      - pydantic-settings
      - openai
      - httpx
